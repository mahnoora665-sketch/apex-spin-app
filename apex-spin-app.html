<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #0f172a; color: white; text-align: center; margin: 0; }
        
        /* 3D Container */
        .scene { 
            width: 300px; height: 300px; margin: 50px auto;
            perspective: 800px; /* 3D effect ke liye perspective zaruri hai */
        }
        
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%;
            border: 10px solid #1e293b;
            transform: rotateX(45deg); /* 3D Tilt effect */
            transform-style: preserve-3d;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            background: conic-gradient(red 0 36deg, blue 36deg 72deg, green 72deg 108deg, ...);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .arrow { 
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; 
            border-top: 40px solid #ef4444; margin: 0 auto; z-index: 10;
        }
    </style>
</head>
<body>

<div class="arrow"></div>
<div class="scene">
    <div class="wheel" id="wheel"></div>
</div>

<button class="btn" onclick="spin()">Spin 3D</button>

<script>
    let deg = 0;
    function spin() {
        deg += 1440 + Math.floor(Math.random() * 360);
        document.getElementById('wheel').style.transform = `rotateX(45deg) rotateZ(${deg}deg)`;
    }
</script>
</body>
</html>
